name: AI Code Reviewer

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  pull_request_review_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || contains(github.event.comment.body, '/review') }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: OpenAI Code Reviewer
        uses: coderabbitai/openai-pr-reviewer@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          debug: false
          review_simple_changes: false
          review_comment_lgtm: false
          system_message: |
            You are @coderabbitai, a Senior Engineer AI Code Reviewer analyzing a Pull Request for the Lensy repository.
            Lensy is an AI-powered documentation quality auditor with a React TypeScript frontend and AWS CDK Typescript backend.
            Your job is to read the PR diffs, find critical bugs, architectural flaws, and enforce standard TypeScript and standard React coding conventions.
            Be concise, helpful, and objective in your review comments.
